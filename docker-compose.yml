# Single-instance stack for the VPS.
#
# IMPORTANT: run EXACTLY ONE replica of `app`. The cron jobs in src/jobs run
# in-process (node-cron), so a second container would double-fire every job
# (double daily resets, double verse notifications, etc). Do not scale this up.
#
# MongoDB (Atlas) and Redis (Upstash) are external — configured via .env.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-pastor:latest
    container_name: ai-pastor
    restart: unless-stopped
    # .env is mounted (not parsed by Compose) so the app's own dotenv reads it.
    # Compose's env_file parser is strict and breaks on the multi-line, quoted
    # FIREBASE_PRIVATE_KEY; dotenv handles it the same way as local dev / Render.
    volumes:
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
      - TZ=UTC
      - PORT=3000
    # Bind to loopback only — Nginx on the host proxies public traffic in.
    # The app is never exposed directly to the internet.
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

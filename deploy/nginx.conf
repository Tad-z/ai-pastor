# AI Pastor — Nginx reverse proxy (host-level, NOT in Docker)
#
# Install on the VPS at: /etc/nginx/sites-available/ai-pastor
# Then: ln -s /etc/nginx/sites-available/ai-pastor /etc/nginx/sites-enabled/ai-pastor
#
# Replace api.yourdomain.com with your real domain (pointed at the VPS IP via an A record).
#
# TLS: this file starts as plain HTTP. After `nginx -t && systemctl reload nginx`,
# run `certbot --nginx -d api.yourdomain.com` and Certbot rewrites this file to add
# the SSL server block + auto-redirect HTTP->HTTPS. Renewal is automatic via the
# certbot systemd timer.

server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;

    # Cap request body to match the app (express.json limit is 10mb)
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Preserve client info so the app sees real IPs (rate limiting, logs)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / keep-alive support (harmless if unused)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_read_timeout    120s;  # AI responses can be slow — don't cut them off
        proxy_send_timeout    120s;
    }

    # Let the app's own /health be reachable for external uptime checks
    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }
}

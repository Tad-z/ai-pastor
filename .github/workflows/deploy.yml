name: Deploy to VPS

# Deploys on every push to main. The VPS pulls the new code and rebuilds the
# Docker image in place. Requires these GitHub repo secrets (Settings → Secrets
# and variables → Actions):
#   VPS_HOST        — server IP or hostname
#   VPS_USER        — SSH user (e.g. deploy)
#   VPS_SSH_KEY     — private SSH key (PEM) authorized on the VPS
#   VPS_PORT        — SSH port (optional, defaults to 22)
#   VPS_APP_DIR     — absolute path to the repo on the VPS (e.g. /home/deploy/ai-pastor)

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

concurrency:
  group: deploy-production
  cancel-in-progress: false # never interrupt an in-flight deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"

            echo "==> Pulling latest code"
            git fetch --all
            git reset --hard origin/main

            echo "==> Building & restarting container"
            docker compose up -d --build --remove-orphans

            echo "==> Pruning old images"
            docker image prune -f

            echo "==> Waiting for health check"
            for i in $(seq 1 20); do
              status=$(docker inspect --format='{{.State.Health.Status}}' ai-pastor 2>/dev/null || echo "starting")
              echo "  health: $status"
              if [ "$status" = "healthy" ]; then
                echo "==> Deploy OK"
                exit 0
              fi
              sleep 5
            done

            echo "!! Container did not become healthy — dumping logs"
            docker compose logs --tail=80 app
            exit 1
